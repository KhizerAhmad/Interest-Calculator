<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <script src="script.js"></script>
        <link rel="stylesheet" href="style.css">
        <title>Simple Interest Calculator</title>
    </head>
    <body>
        <div class="maindiv">
            <h2>Interest Calculator</h2>

            <label>Amount</label>
            <input type="number" id="principal" required><br>

            <label>Rate</label>
            <input type="range" id="rate" min="1" max="20" value="10.25" step="0.25" onchange="updateRate()" required> 
            <span id="rate_val">
                10.25
            </span>% <br>

            <label>No. of Years</label>
            <input type="number" id="years" list="all_years" required>
            <datalist id="all_years">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
            </datalist><br>
            <br>
            <label>Interest: </label><br>
            <span id="result"></span>

            <button onclick="compute()">Compute Interest</button>
            <button onclick="reset()">Reset</button>
        </div>

        <footer>
            &#169; Copyrights | Khizer Ahmad
        </footer>
    </body>
</html>
